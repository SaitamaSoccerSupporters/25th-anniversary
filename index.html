<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS 25th Anniversary</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .fullscreen-bg {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative; /* ボタンを重ねるために必要 */
        }

        .fullscreen-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* 歴史ページへのリンクボタンのスタイル */
        .history-link {
            position: absolute;
            bottom: 15%; /* 画面の下から15%の位置に配置 */
            padding: 15px 40px;
            background-color: rgba(231, 76, 60, 0.9); /* SSSらしい赤系の色 */
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            font-family: sans-serif;
        }

        .history-link:hover {
            background-color: #c0392b;
            transform: scale(1.05); /* ホバー時に少し大きくする */
        }
    </style>
</head>
<body>

    <div class="fullscreen-bg">
        <img src="images/imgLP.png" alt="SSS 25th Anniversary">
        
        <a href="history.html" class="history-link">25年の歴史を見る</a>
    </div>

</body>
</html>
