<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSS 25th Anniversary</title>
    <style>
        /* 画面全体の余白をゼロにする */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* スクロールバーを出さない */
            background-color: #000; /* 画像の背景を黒にして引き締める */
        }

        /* 画像をフルスクリーンで表示する設定 */
        .fullscreen-bg {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 画面いっぱいに引き伸ばしつつ比率を維持 */
            object-position: center; /* 中央合わせ */
        }

        /* 文字を入れたい場合のためのスタイル（任意） */
        .overlay-text {
            position: absolute;
            color: white;
            text-align: center;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="fullscreen-bg">
        <img src="images/imgLP.png" alt="SSS 25th Anniversary">
    </div>

</body>
</html>
